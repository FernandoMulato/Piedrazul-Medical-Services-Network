version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: medical-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres-users:
    image: postgres:14
    container_name: medical-postgres-users
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: medical_user
      POSTGRES_PASSWORD: medical123
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-appointments:
    image: postgres:14
    container_name: medical-postgres-appointments
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: appointments_db
      POSTGRES_USER: medical_user
      POSTGRES_PASSWORD: medical123
    volumes:
      - postgres_appointments_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
  postgres_users_data:
  postgres_appointments_data: