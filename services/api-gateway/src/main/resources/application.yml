server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: users-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: usersServiceCircuitBreaker
                fallbackUri: forward:/fallback/users
        - id: appointments-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/appointments/**
          filters:
            - name: CircuitBreaker
              args:
                name: appointmentsServiceCircuitBreaker
        - id: professionals-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/professionals/**
          filters:
            - name: CircuitBreaker
              args:
                name: professionalsServiceCircuitBreaker
        - id: clinical-records-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/clinical-records/**
          filters:
            - name: CircuitBreaker
              args:
                name: clinicalRecordsServiceCircuitBreaker
        - id: reports-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/reports/**
          filters:
            - name: CircuitBreaker
              args:
                name: reportsServiceCircuitBreaker
        - id: audits-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/audits/**
          filters:
            - name: CircuitBreaker
              args:
                name: auditsServiceCircuitBreaker

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        timeoutDuration: 4s
    instances:
      usersServiceCircuitBreaker:
        baseConfig: default
      appointmentsServiceCircuitBreaker:
        baseConfig: default
      professionalsServiceCircuitBreaker:
        baseConfig: default
      clinicalRecordsServiceCircuitBreaker:
        baseConfig: default
      reportsServiceCircuitBreaker:
        baseConfig: default
      auditsServiceCircuitBreaker:
        baseConfig: default

jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-that-is-at-least-256-bits-long}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.medical: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
