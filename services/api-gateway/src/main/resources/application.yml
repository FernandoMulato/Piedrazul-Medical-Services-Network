server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes: []

jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-that-is-at-least-256-bits-long}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.medical: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
